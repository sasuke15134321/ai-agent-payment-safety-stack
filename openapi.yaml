openapi: 3.1.0
info:
  title: AI Agent Payment Safety Stack
  version: 0.1.0
  description: >
    AI agent control primitives for budget checks, evidence checks, routing,
    human review, and approval unit generation.

    Core concept: Approval Unit = Human Decision Contract.
    Use POST /api/approval-unit/build to convert AI-generated candidates into
    minimal human-approvable decision units.

    Also includes AI-readable guidance for Agent Action Atom and Agent Payment Action Record
    to help describe, audit, and review AI-agent payment decisions.

servers:
  - url: https://ai-agent-payment-safety-stack.onrender.com
    description: Production (Render)

paths:
  /api/approval-unit/build:
    post:
      summary: Build a minimal human decision contract from an AI-generated candidate.
      description: >
        Converts AI-generated findings, patches, payment requests, deployment proposals,
        memory writes, tool execution requests, or decision-support outputs into a
        minimal Approval Unit (Human Decision Contract).

        The Approval Unit defines:
        - what the human is being asked to approve
        - what actions become allowed if approved
        - what remains blocked
        - what happens if rejected, reworked, or escalated
        - what human-side action is suggested next
        - an approval_unit_hash for audit or future blockchain anchoring

        v0.1 constraints — build only:
        - no approval execution
        - no payment execution
        - no deploy execution
        - no memory write execution
        - no tool execution
        - no blockchain transaction
        - approval_question is generated by rule-based templates
        - approval_unit_hash is generated from canonical fields
      operationId: buildApprovalUnit
      tags:
        - Approval Unit Builder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalUnitBuildRequest'
            example:
              source_type: security_patch
              approval_unit_type: security_patch_approval
              finding_id: finding_001
              patch_id: patch_001
              title: Approve patch for SQL injection in user API
              summary: Replace raw SQL interpolation with parameterized query.
              risk_level: high
              severity: critical
              evidence_ids:
                - mythos_finding_001
                - codeql_001
              source_ids:
                - "repo:user-api"
                - "scanner:codeql"
              test_results:
                - unit_passed
                - integration_passed
                - security_retest_passed
              regression_risk: medium
              rollback_available: true
              blocked_actions_until_approval:
                - merge_to_staging
                - deploy_to_production
              allowed_human_actions:
                - approve
                - reject
                - request_rework
                - request_more_evidence
                - escalate
              approver_role: security_reviewer
              request_id: req_123
              task_id: security_remediation_001
              agent_id: agent_security_01
      responses:
        '200':
          description: Approval Unit built successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalUnitBuildResponse'

  /api/remediation/verify:
    post:
      summary: Verify an AI-generated remediation candidate before routing to human review.
      description: >
        Rule-based verification of AI-generated findings, patches, remediation plans,
        configuration changes, dependency updates, and deployment proposals.

        Checks evidence status, test results, security retest status, regression status,
        rollback readiness, blast radius, and production risk.

        Returns a decision (route_to_approval_unit_builder / require_more_evidence /
        require_security_retest / require_rollback_plan / block_production_deploy /
        pass_with_warnings) and approval_unit_ready flag.

        If approval_unit_ready = true, the result can be passed to Approval Unit Builder.

        v0.1 constraints — rule-based verification only:
        - no patch application
        - no deployment
        - no approval execution
        - no payment execution
        - no memory write
        - no tool execution
        - no blockchain transaction
      operationId: verifyRemediation
      tags:
        - Remediation Verification Gate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemediationVerifyRequest'
            example:
              remediation_id: remediation_001
              finding_id: finding_001
              source_type: security_patch
              remediation_type: patch_candidate
              title: SQL injection fix for user API
              finding_summary: Potential SQL injection in user lookup endpoint.
              remediation_summary: Replace raw SQL interpolation with parameterized query.
              patch_id: patch_001
              affected_files:
                - api/user.py
              affected_services:
                - user-api
              affected_environment: staging
              severity: critical
              risk_level: high
              evidence_ids:
                - mythos_finding_001
                - codeql_001
              source_ids:
                - "repo:user-api"
                - "scanner:codeql"
              test_results:
                - unit_passed
                - integration_passed
              security_retest_results:
                - security_retest_passed
              regression_test_results:
                - regression_passed
              rollback_plan_id: rollback_001
              rollback_available: true
              blast_radius: single_service
              production_deploy_requested: false
              request_id: req_123
              task_id: security_remediation_001
      responses:
        '200':
          description: Verification completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemediationVerifyResponse'

  /:
    get:
      summary: API root
      operationId: root
      tags:
        - Info
      responses:
        '200':
          description: API info

  /health:
    get:
      summary: Health check
      operationId: health
      tags:
        - Info
      responses:
        '200':
          description: OK

components:
  schemas:
    ApprovalUnitBuildRequest:
      type: object
      required:
        - source_type
        - approval_unit_type
        - title
        - summary
        - risk_level
      properties:
        source_type:
          type: string
          description: Type of the source (e.g. security_patch, payment_request)
        source_id:
          type: string
          nullable: true
        approval_unit_type:
          type: string
          description: >
            One of: security_patch_approval, remediation_plan_approval,
            payment_approval, deployment_approval, decision_card_approval,
            legal_review_approval, financial_review_approval,
            evidence_exception_approval, memory_write_approval,
            tool_execution_approval
        finding_id:
          type: string
          nullable: true
        claim_id:
          type: string
          nullable: true
        patch_id:
          type: string
          nullable: true
        payment_request_id:
          type: string
          nullable: true
        deployment_request_id:
          type: string
          nullable: true
        memory_write_id:
          type: string
          nullable: true
        tool_call_id:
          type: string
          nullable: true
        review_task_id:
          type: string
          nullable: true
        title:
          type: string
        summary:
          type: string
        risk_level:
          type: string
          description: "One of: low, medium, high, critical"
        severity:
          type: string
          nullable: true
        evidence_ids:
          type: array
          items:
            type: string
          default: []
        source_ids:
          type: array
          items:
            type: string
          default: []
        test_results:
          type: array
          items:
            type: string
          default: []
        regression_risk:
          type: string
          nullable: true
        rollback_available:
          type: boolean
          nullable: true
        cost_impact:
          type: object
          nullable: true
        blocked_actions_until_approval:
          type: array
          items:
            type: string
          default: []
        allowed_human_actions:
          type: array
          items:
            type: string
          default:
            - approve
            - reject
            - request_rework
            - request_more_evidence
            - escalate
        suggested_human_actions:
          type: array
          items:
            type: string
          default: []
        recommended_decision:
          type: string
          nullable: true
        reviewer_role:
          type: string
          nullable: true
        approver_role:
          type: string
          default: human_approver
        request_id:
          type: string
          nullable: true
        task_id:
          type: string
          nullable: true
        agent_id:
          type: string
          nullable: true

    ApprovalUnitBuildResponse:
      type: object
      properties:
        approval_unit_id:
          type: string
          description: Unique identifier for this approval unit
        approval_unit_hash:
          type: string
          description: SHA-256 hash of canonical fields for audit stability
        approval_unit_type:
          type: string
        title:
          type: string
        approval_question:
          type: string
          description: Rule-based generated question defining what the human is approving
        decision_required:
          type: string
          description: Pipe-separated decision options
        decision_options:
          type: array
          items:
            type: string
        approver_role:
          type: string
        priority:
          type: string
        risk_level:
          type: string
        summary:
          type: string
        evidence_summary:
          type: string
        required_evidence:
          type: array
          items:
            type: string
        required_checks_before_approval:
          type: array
          items:
            type: string
        test_summary:
          type: string
        regression_risk:
          type: string
          nullable: true
        rollback_available:
          type: boolean
          nullable: true
        suggested_human_actions:
          type: array
          items:
            type: string
        recommended_human_action:
          type: string
          description: Single recommended action selected by rule-based logic
        human_action_reason:
          type: string
          description: Reason for the recommended action
        allowed_human_actions:
          type: array
          items:
            type: string
        blocked_actions_until_approval:
          type: array
          items:
            type: string
        if_approved:
          type: object
          description: Defines allowed_actions, still_blocked_actions, post_decision_route
        if_rejected:
          type: object
          description: Defines blocked_actions, post_decision_route
        if_request_rework:
          type: object
          description: Defines post_decision_route, required_changes
        if_request_more_evidence:
          type: object
          description: Defines post_decision_route, required_evidence
        if_escalated:
          type: object
          description: Defines post_decision_route, required_context
        post_decision_route:
          type: string
        decision_effect_summary:
          type: string
        audit_required:
          type: boolean
        blockchain_anchor_ready:
          type: boolean
          description: "Always true in v0.1 (readiness flag only)"
        chain_anchor_status:
          type: string
          description: "Always 'not_anchored' in v0.1"
        chain_tx_hash:
          type: string
          nullable: true
          description: "Always null in v0.1"
        request_id:
          type: string
          nullable: true
        task_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    RemediationVerifyRequest:
      type: object
      required:
        - remediation_id
        - source_type
        - remediation_type
        - title
        - finding_summary
        - remediation_summary
        - severity
        - risk_level
      properties:
        remediation_id:
          type: string
        finding_id:
          type: string
          nullable: true
        source_type:
          type: string
        source_id:
          type: string
          nullable: true
        remediation_type:
          type: string
          description: "One of: patch_candidate, remediation_plan, configuration_change, dependency_update, deployment_proposal"
        title:
          type: string
        finding_summary:
          type: string
        remediation_summary:
          type: string
        patch_id:
          type: string
          nullable: true
        patch_diff_id:
          type: string
          nullable: true
        configuration_change_id:
          type: string
          nullable: true
        dependency_update_id:
          type: string
          nullable: true
        affected_files:
          type: array
          items:
            type: string
          default: []
        affected_services:
          type: array
          items:
            type: string
          default: []
        affected_environment:
          type: string
          nullable: true
        severity:
          type: string
          description: "One of: low, medium, high, critical"
        risk_level:
          type: string
          description: "One of: low, medium, high, critical"
        exploitability:
          type: string
          nullable: true
        evidence_ids:
          type: array
          items:
            type: string
          default: []
        source_ids:
          type: array
          items:
            type: string
          default: []
        test_results:
          type: array
          items:
            type: string
          default: []
        security_retest_results:
          type: array
          items:
            type: string
          default: []
        static_analysis_results:
          type: array
          items:
            type: string
          default: []
        dynamic_analysis_results:
          type: array
          items:
            type: string
          default: []
        regression_test_results:
          type: array
          items:
            type: string
          default: []
        rollback_plan_id:
          type: string
          nullable: true
        rollback_available:
          type: boolean
          nullable: true
        blast_radius:
          type: string
          nullable: true
        production_impact:
          type: string
          nullable: true
        staging_tested:
          type: boolean
          nullable: true
        production_deploy_requested:
          type: boolean
          default: false
        generated_by_agent_id:
          type: string
          nullable: true
        request_id:
          type: string
          nullable: true
        task_id:
          type: string
          nullable: true

    RemediationVerifyResponse:
      type: object
      properties:
        gate_name:
          type: string
        remediation_id:
          type: string
        finding_id:
          type: string
          nullable: true
        remediation_type:
          type: string
        decision:
          type: string
          description: >
            One of: route_to_approval_unit_builder, require_more_evidence,
            require_security_retest, require_rollback_plan,
            block_production_deploy, pass_with_warnings
        verification_status:
          type: string
          description: "One of: verified, verified_with_warnings, blocked, incomplete"
        readiness_level:
          type: string
          description: "One of: human_approval_ready, needs_more_evidence, needs_testing, needs_rollback_plan, needs_review"
        risk_level:
          type: string
        severity:
          type: string
        evidence_status:
          type: string
          description: "One of: sufficient, missing"
        test_status:
          type: string
          description: "One of: passed, missing"
        security_retest_status:
          type: string
          description: "One of: passed, required, missing"
        regression_status:
          type: string
          description: "One of: passed, missing"
        rollback_status:
          type: string
          description: "One of: available, available_without_plan_id, missing"
        blast_radius:
          type: string
          nullable: true
        production_risk:
          type: string
          description: "One of: not_requested, requires_review, blocked"
        allowed_next_steps:
          type: array
          items:
            type: string
        blocked_next_steps:
          type: array
          items:
            type: string
        recommended_route:
          type: string
        recommended_human_action:
          type: string
        human_action_reason:
          type: string
        required_additional_evidence:
          type: array
